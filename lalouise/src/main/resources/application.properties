spring.application.name=lalouise

# ── Server ────────────────────────────────────────────────────────
server.port=8080

# ── DataSource ────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/lalouisedb
spring.datasource.username=lalouise
spring.datasource.password=lalouise123
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway ────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── Mail ──────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=seuemail@gmail.com
spring.mail.password=sua-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── JWT ───────────────────────────────────────────────────────────
jwt.secret=minha-chave-super-secreta-com-32bytes!!

# ── Logging ───────────────────────────────────────────────────────
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG