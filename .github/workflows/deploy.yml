name: Deploy on VPS

on:
  push:
    branches:
      - main
    paths:
      - 'lalouise/**'

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JAVA
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Run tests
        run: ./gradlew test
        working-directory: ./lalouise

  deploy:
    runs-on: ubuntu-22.04
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JAVA
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build with Gradle
        run: ./gradlew clean build -x test
        working-directory: ./lalouise

      - name: Upload jar to VPS
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          scp -i /tmp/ssh_key \
              -o StrictHostKeyChecking=no \
              lalouise/build/libs/lalouise-0.0.1-SNAPSHOT.jar \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/lalouise/

      - name: Restart application on VPS
        run: |
          ssh -i /tmp/ssh_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              "docker restart lalouise-api"
